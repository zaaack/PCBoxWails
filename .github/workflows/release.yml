name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
            runner: windows-latest
          - goos: linux
            goarch: amd64
            suffix: ''
            runner: ubuntu-22.04
          - goos: darwin
            goarch: universal
            suffix: ''
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    env:
      PCBOX_BUILD: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build
        run: wails build --platform ${{ matrix.goos }}/${{ matrix.goarch }} -o PCBox${{ matrix.suffix }}

      - name: List build output
        shell: bash
        run: ls -la build/bin/

      - name: Package
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a PCBox-${{ matrix.goos }}-${{ matrix.goarch }}.zip build/bin/PCBox${{ matrix.suffix }}
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            cd build/bin && tar czf ../../PCBox-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz PCBox.app && cd ../..
          else
            tar czf PCBox-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz -C build/bin PCBox
          fi

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: PCBox-${{ matrix.goos }}-*.*
